<svg xmlns="http://www.w3.org/2000/svg" id="tuxpaper-engine" viewBox="0 0 24 24">
  <!-- Wallpaper frame -->
  <rect x="2" y="8" width="20" height="15" rx="2" fill="#2c3e50"/>
  <rect x="4" y="10" width="16" height="11" rx="1" fill="#ecf0f1"/>

  <!-- Paint splotch on the screen (wallpaper content) -->
  <circle cx="12" cy="15" r="3" fill="#3498db" opacity="0.6"/>
  <circle cx="9" cy="14" r="2" fill="#e74c3c" opacity="0.5"/>
  <circle cx="15" cy="16" r="2.5" fill="#f39c12" opacity="0.5"/>

  <!-- Penguin body/head peeking from behind the frame -->
  <ellipse cx="12" cy="5" rx="6" ry="6" fill="#1a1a2e"/>

  <!-- White face -->
  <ellipse cx="12" cy="6" rx="4" ry="4" fill="#ffffff"/>

  <!-- Eyes -->
  <circle cx="10" cy="5" r="0.9" fill="#1a1a2e"/>
  <circle cx="14" cy="5" r="0.9" fill="#1a1a2e"/>

  <!-- Eye shine -->
  <circle cx="9.4" cy="4.5" r="0.3" fill="#ffffff"/>
  <circle cx="13.4" cy="4.5" r="0.3" fill="#ffffff"/>

  <!-- Beak -->
  <polygon points="11,7 13,7 12,8.5" fill="#f39c12"/>

  <!-- Flippers gripping the frame -->
  <ellipse cx="6" cy="9" rx="1.5" ry="2.5" fill="#1a1a2e" transform="rotate(-15, 6, 9)"/>
  <ellipse cx="18" cy="9" rx="1.5" ry="2.5" fill="#1a1a2e" transform="rotate(15, 18, 9)"/>
</svg>
